<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Адмін — Чат підтримки</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1FAF5A;--gl2:#e8eae8;--gt:#6b7280;--dk:#1a1d1f;--bg:#f4f5f3;--w:#fff;--red:#ff3b30;--blue:#2563eb;--r:12px}
body{font-family:"Manrope",sans-serif;background:var(--bg);color:var(--dk);height:100vh;display:flex;flex-direction:column}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
#auth-screen h1{font-size:22px;font-weight:800}
#pw-inp{height:44px;border:2px solid var(--gl2);border-radius:10px;padding:0 16px;font-size:15px;font-family:inherit;outline:none;width:280px;transition:border-color .2s}
#pw-inp:focus{border-color:var(--blue)}
#auth-screen button{height:44px;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:0 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
#auth-screen button:hover{background:#1d4ed8}

/* LAYOUT */
#admin-app{display:none;flex:1;overflow:hidden}
.sidebar{width:300px;background:var(--w);border-right:1px solid var(--gl2);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-hdr{padding:18px 20px;border-bottom:1px solid var(--gl2);display:flex;align-items:center;justify-content:space-between}
.sidebar-hdr h2{font-size:17px;font-weight:800}
.logout-btn{font-size:12px;color:var(--gt);cursor:pointer;border:none;background:none;font-family:inherit}
.logout-btn:hover{color:var(--red)}
#sessions-list{flex:1;overflow-y:auto}
.no-chats{text-align:center;color:var(--gt);font-size:13px;padding:40px 20px}

.session-item{padding:14px 20px;border-bottom:1px solid var(--gl2);cursor:pointer;transition:background .12s}
.session-item:hover{background:var(--bg)}
.session-active{background:#eff6ff!important;border-right:3px solid var(--blue)}
.s-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.s-id{font-size:13px;font-weight:700;color:var(--dk)}
.s-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
.s-last{font-size:12px;color:var(--gt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.s-time{font-size:11px;color:var(--gt)}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-hdr{padding:16px 24px;border-bottom:1px solid var(--gl2);background:var(--w);font-size:15px;font-weight:700;flex-shrink:0}
#admin-msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px}
.no-msgs{text-align:center;color:var(--gt);font-size:13px;margin-top:40px}
.chat-placeholder{display:flex;align-items:center;justify-content:center;flex:1;color:var(--gt);font-size:14px}

.a-msg{display:flex;flex-direction:column;max-width:70%}
.a-msg--user{align-self:flex-start;align-items:flex-start}
.a-msg--admin{align-self:flex-end;align-items:flex-end}
.a-bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.a-msg--user .a-bubble{background:var(--gl2);color:var(--dk);border-bottom-left-radius:4px}
.a-msg--admin .a-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.a-time{font-size:11px;color:var(--gt);margin-top:3px;padding:0 2px}

#admin-reply-wrap{display:none;align-items:center;gap:10px;padding:16px 24px;border-top:1px solid var(--gl2);background:var(--w);flex-shrink:0}
#admin-inp{flex:1;height:42px;border:2px solid var(--gl2);border-radius:50px;padding:0 16px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
#admin-inp:focus{border-color:var(--blue)}
#admin-reply-wrap button{height:42px;background:var(--blue);color:#fff;border:none;border-radius:50px;padding:0 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
#admin-reply-wrap button:hover{background:#1d4ed8}
</style>
</head>
<body>

<div id="auth-screen">
  <h1>Адмін-панель</h1>
  <input type="password" id="pw-inp" placeholder="Пароль">
  <button onclick="checkPw()">Увійти</button>
</div>

<div id="admin-app">
  <div class="sidebar">
    <div class="sidebar-hdr">
      <h2>Чати підтримки</h2>
      <button class="logout-btn" onclick="logout()">Вийти</button>
    </div>
    <div id="sessions-list"><div class="no-chats">Завантаження...</div></div>
  </div>
  <div class="chat-area">
    <div class="chat-hdr" id="chat-hdr">Оберіть чат зі списку</div>
    <div id="admin-msgs"><div class="chat-placeholder">Оберіть розмову зліва</div></div>
    <div id="admin-reply-wrap">
      <input id="admin-inp" placeholder="Відповідь клієнту...">
      <button onclick="sendAdminMsg()">Надіслати</button>
    </div>
  </div>
</div>

<script type="module" src="/src/js/admin.js"></script>
</body>
</html>
